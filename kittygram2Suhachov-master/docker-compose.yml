version: '3.8'

services:
  web:
    build: .
    container_name: lostfound_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
    env_file:
      - .env
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped